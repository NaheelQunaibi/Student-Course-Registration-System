<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    
    <nav>
        <ul>
            <li><a href="student_dashboard.html">Dashboard</a></li>
            <li><a href="course_listing_search.html">Browse & Search Courses</a></li>
            <li><a href="my_registered_courses.html">My Registered Courses</a></li>
            <li><a href="login.html">Logout</a></li>
        </ul>
    </nav>
    
    <form id="loginForm" action="/login" method="POST">
        <h1>Log In</h1>
        <p>Please sign in to your account</p>
        
        <div>
            <input type="email" id="email" name="email" required autocomplete="username" placeholder="enter your email">
        </div>

        <div>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="enter your password">
        </div>
        
        <div>
            <button type="submit">Login</button>
        </div>

        <div>
            <a href="#">Forgot password?</a>
        </div>

        <div>
            <p>Don't have an account? <a href="#">Sign up here</a></p>
        </div>
    </form>

</body>
</html>
