<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="student_dashboard.html">Course Registration</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="student_dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="course_listing_search.html">Browse Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="my_registered_courses.html">My Courses</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="login.html">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="alert alert-success">
            <h4 class="mb-0">Welcome, Naheel!</h4>
            <small>Student Dashboard</small>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">Total Credits</h5>
                        <h2 class="display-4" id="totalCredits">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">Courses Enrolled</h5>
                        <h2 class="display-4" id="coursesEnrolled">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header">
                <strong>Recent Activity</strong>
            </div>
            <div class="card-body text-center text-muted" id="recentActivity">
                <p>No recent activity. Browse courses to get started.</p>
                <a href="course_listing_search.html" class="btn btn-primary">Browse Courses →</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
