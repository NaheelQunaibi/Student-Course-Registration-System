<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Overview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="administrator_dashboard.html">Admin Panel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="administrator_dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="manage_courses.html">Manage Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="manage_prerequisites.html">Manage Prerequisites</a></li>
                    <li class="nav-item"><a class="nav-link active" href="student_registration_overview.html">View Registrations</a></li>
                    <li class="nav-item"><a class="nav-link text-warning" href="login.html">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Student Registration Overview</h1>

        <div class="row mb-3">
            <div class="col-md-4">
                <label for="courseFilter" class="form-label">Filter by Course</label>
                <select id="courseFilter" class="form-select" onchange="filterRegistrations()">
                    <option value="all">All Courses</option>
                    <option value="CS101">CS101 - Programming</option>
                    <option value="CS102">CS102 - Data Structures</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="studentFilter" class="form-label">Filter by Student</label>
                <select id="studentFilter" class="form-select" onchange="filterRegistrations()">
                    <option value="all">All Students</option>
                    <option value="Naheel">Naheel</option>
                    <option value="Yomna">Yomna Jbareen</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Student Name</th>
                        <th>Student ID</th>
                        <th>Course Title</th>
                        <th>Registration Date</th>
                    </tr>
                </thead>
                <tbody id="registrationsTableBody">
                    <tr>
                        <td colspan="4" class="text-center text-muted">No registrations yet</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <p><strong>Total Registrations: <span id="totalRegistrations">0</span></strong></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
